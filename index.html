<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expe-5 Live Tracker</title>
    <script src="https://cdn.maptiler.com/maptiler-sdk-js/v2.0.3/maptiler-sdk.umd.min.js"></script>
    <link href="https://cdn.maptiler.com/maptiler-sdk-js/v2.0.3/maptiler-sdk.css" rel="stylesheet" />
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
        
        .info-box {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            background: rgba(255, 255, 255, 0.9);
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            min-width: 200px;
            border: 1px solid #ddd;
        }

        .info-box h2 { margin: 0 0 10px 0; font-size: 16px; color: #333; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .status-text { font-size: 13px; line-height: 1.6; color: #555; }
        .loading { color: #f39c12; font-weight: bold; }
    </style>
</head>
<body>

<div class="info-box">
    <h2>Device: Expe-5</h2>
    <div id="status" class="status-text">
        <span class="loading">Locating satellites...</span>
    </div>
</div>

<div id="map"></div>

<script>
    // --- CONFIGURATION ---
    const mtApiKey = "tsWhgOSkcTQX9WdC2hq6";
    const mapId = "019d358b-c1d8-78ea-930c-44a9d2ebd17c"; // Your custom MapTiler Map ID

    // 1. Initialize MapTiler Map
    const map = new maptilersdk.Map({
        container: 'map',
        style: mapId,
        apiKey: mtApiKey,
        center: [0, 0], // Default center until data loads
        zoom: 2
    });

    // 2. Create the Marker (Red)
    const marker = new maptilersdk.Marker({ color: "#FF0000" });

    // 3. The Update Function
    async function updateMapFromLocalJSON() {
        try {
            // Fetch the file generated by your GitHub Action
            // Adding a timestamp prevents the browser from caching old data
            const response = await fetch(`./data/location.json?t=${new Date().getTime()}`);
            
            if (!response.ok) throw new Error("JSON file not found");
            
            const data = await response.json();
            
            if (data.lat && data.lon) {
                const position = [data.lon, data.lat];

                // Update Marker position
                marker.setLngLat(position).addTo(map);

                // Smoothly move the camera
                map.flyTo({ 
                    center: position, 
                    zoom: 13,
                    essential: true 
                });
                
                // Update the UI
                const dateParsed = data.time ? new Date(data.time).toLocaleString() : "Recently";
                document.getElementById('status').innerHTML = 
                    `<b>Last Seen:</b> ${dateParsed}<br>` +
                    `<b>Latitude:</b> ${data.lat.toFixed(6)}<br>` +
                    `<b>Longitude:</b> ${data.lon.toFixed(6)}`;
            }
        } catch (err) {
            console.error("Error loading local JSON:", err);
            document.getElementById('status').innerHTML = 
                `<span style="color:red">Error syncing location data.</span>`;
        }
    }

    // Run when map is ready
    map.on('load', () => {
        updateMapFromLocalJSON();
        // Auto-refresh every 5 minutes to catch GitHub Action updates
        setInterval(updateMapFromLocalJSON, 300000); 
    });

</script>
</body>
</html>
