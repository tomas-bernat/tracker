name: Sync Garmin Data
on:
  schedule:
    - cron: '*/10 * * * *' # Runs every 10 minutes
  workflow_dispatch: # Allows you to run it manually

jobs:
  get-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Fetch and Filter KML
        run: |
          curl -L "https://share.garmin.com/feed/share/YOUR_GARMIN_USERNAME" -o data.kml
          
          # 1. Extract only the section for the specific folder
          # This finds the line with your folder name and grabs everything until the next </Folder>
          sed -n '/<name>Expe-5 inReach Mini II<\/name>/,/<\/Folder>/p' data.kml > folder_block.txt
          
          # 2. Extract Lat/Lon from THAT specific block
          LAT=$(grep -A 1 'name="Latitude"' folder_block.txt | grep -oP '(?<=<value>)[^<]+')
          LON=$(grep -A 1 'name="Longitude"' folder_block.txt | grep -oP '(?<=<value>)[^<]+')
          
          # 3. Save to JSON
          echo "{\"lat\": $LAT, \"lon\": $LON}" > data/location.json

      - name: Commit and Push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add data/location.json
          git commit -m "Update Garmin location" || exit 0
          git push
