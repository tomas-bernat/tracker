name: Sync Garmin Data
on:
  schedule:
    - cron: '0 */2 * * *' # Runs at minute 0 of every 2nd hour
  workflow_dispatch: # Allows you to run it manually

jobs:
  get-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Fetch and Filter KML
        run: |
          curl -L "https://share.garmin.com/feed/share/Expeditionclub" -o data.kml
          
          # 1. Extract only the section for the specific folder
          # This finds the line with your folder name and grabs everything until the next </Folder>
          sed -n '/<name>Expe-5 inReach Mini II<\/name>/,/<\/Folder>/p' data.kml > folder_block.txt
          
          # 2. Extract Lat/Lon from THAT specific block
          LAT=$(grep -A 1 'name="Latitude"' folder_block.txt | grep -oP '(?<=<value>)[^<]+')
          LON=$(grep -A 1 'name="Longitude"' folder_block.txt | grep -oP '(?<=<value>)[^<]+')
          ELE=$(grep -A 1 'name="Elevation"' folder_block.txt | grep -oP '(?<=<value>)[^<]+')
          
          # Set Timezone to Central Europe (Prague/Berlin/Paris) 
          # This automatically handles UTC+2 (Summer) or UTC+1 (Winter)
          TIME_LOCAL=$(TZ='Europe/Prague' date '+%Y-%m-%d %H:%M:%S')
          
          # 3. Create the JSON
          echo "{\"lat\": $LAT, \"lon\": $LON, \"time\": \"$TIME_LOCAL\"}" > data/location.json

      - name: Commit and Push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add data/location.json
          git commit -m "Update Garmin location" || exit 0
          git push
